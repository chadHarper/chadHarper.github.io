<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.url == "/" %}{{ site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="theme-color" content="#F5F0EB">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=JetBrains+Mono:wght@400&family=Literata:opsz,wght@7..72,400;7..72,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="152x152" href="{{ '/assets/apple-icon-152x152.png' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/assets/faviconOb.ico' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  {% if page.math %}
    {% if page.math_engine == "mathjax" %}
      {% include mathjax.html %}
    {% else %}
      {% include katex.html %}
    {% endif %}
  {% endif %}
</head>
